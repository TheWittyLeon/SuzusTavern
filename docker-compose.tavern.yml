# Suzu's Tavern — Next.js Node server (NOT static; has API routes + cookie-BFF + SSR).
# Deploy target: nekonova-aux (10.69.69.127) — co-located with the NekoNova
#   dashboard (nekonova-dashboard). Change the host in your deploy step if desired.
#
# Reaches homelab services by host IP (same pattern as the dashboard):
#   - NekoNova Flask API (/api/dnd/*, /api/narration/stream) : 10.69.69.43:8080
#   - Authentication-Python (cookie-BFF target)              : 10.69.69.43:5555
#
# Run:  docker compose -f docker-compose.tavern.yml up -d --build
services:
  suzu-tavern:
    build:
      context: .
      args:
        NEXT_PUBLIC_NEKANOVA_URL: http://10.69.69.43:8080
        AUTH_API_URL: http://10.69.69.43:5555
    container_name: nekonova-tavern
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side runtime values (the proxy + BFF read these via process.env).
      # NEXT_PUBLIC_NEKANOVA_URL is also baked at build for the client bundle;
      # kept here so the server-side proxy resolves the same target at runtime.
      NEXT_PUBLIC_NEKANOVA_URL: http://10.69.69.43:8080
      AUTH_API_URL: http://10.69.69.43:5555
      NODE_ENV: production
      # This host serves the Tavern over plain HTTP on the LAN (no TLS). Browsers
      # DROP `Secure` cookies over HTTP, which would break the login session — so
      # the session cookies must NOT be Secure here. httpOnly + SameSite=Lax still
      # apply. ⚠️ Put the Tavern behind HTTPS (Caddy) and flip this back to "true"
      # before ANY public/WAN exposure — until then LAN traffic is unencrypted.
      COOKIE_SECURE: "false"
    healthcheck:
      # 127.0.0.1 (IPv4), not localhost — same lesson as the dashboard: the
      # Node server binds 0.0.0.0:3000 (IPv4); a localhost probe may hit ::1.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
